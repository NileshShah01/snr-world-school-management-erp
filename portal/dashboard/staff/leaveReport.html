<section id="leaveReportSection" class="dashboard-section hidden">
                <div class="header">
                    <div>
                        <h1><i class="fas fa-chart-pie text-primary"></i> Leave Report</h1>
                        <p>Year-wise leave summary by employee and type</p>
                    </div>
                </div>
                <div class="card max-w-400 mx-auto p-1-5 mb-1-5">
                    <div class="form-group">
                        <label>Year</label>
                        <input type="number" id="leaveReportYear" class="form-control" value="${new Date().getFullYear()}" min="2020" max="2030" onchange="loadLeaveReport()">
                    </div>
                </div>
                <div class="card p-1-5">
                    <div class="table-container">
                        <table class="portal-table">
                            <thead>
                                <tr>
                                    <th>Employee</th>
                                    <th class="text-center">Casual</th>
                                    <th class="text-center">Sick</th>
                                    <th class="text-center">Earned</th>
                                    <th class="text-center">Total</th>
                                </tr>
                            </thead>
                            <tbody id="leaveReportBody">
                                <tr><td colspan="5" class="text-center text-muted p-2">Select year and click to generate</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
