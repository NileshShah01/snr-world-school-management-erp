<section id="manageExamSection" class="dashboard-section card hidden">
                    <div class="header mb-2 text-center">
                        <h1>Manage Examinations</h1>
                        <p>Define assessment terms and academic milestones</p>
                    </div>
                    <div class="grid-2 gap-2">
                        <div class="glass-card p-2">
                            <h3><i class="fas fa-calendar-plus text-primary mr-0-5"></i> Define Exam</h3>
                            <form id="addExamForm" onsubmit="handleExamSubmit(event)" class="mt-1-5">
                                <div class="form-group">
                                    <label>Target Session</label>
                                    <select
                                        id="examSessionSelect"
                                        class="form-control"
                                        required
                                        title="Select Session"
                                    ></select>
                                </div>
                                <div class="form-group">
                                    <label>Exam Title (e.g., Term 1)</label>
                                    <input
                                        type="text"
                                        id="examNameInput"
                                        class="form-control"
                                        placeholder="Half Yearly"
                                        required
                                        title="Exam Title"
                                    />
                                </div>
                                <div class="form-group">
                                    <label>Result Weightage (%)</label>
                                    <input
                                        type="number"
                                        id="examWeightageInput"
                                        class="form-control"
                                        placeholder="50"
                                        required
                                        title="Result Weightage"
                                    />
                                </div>
                                <button type="submit" class="btn-portal btn-primary w-full mt-1">
                                    <i class="fas fa-plus mr-1"></i> Initialize Exam Term
                                </button>
                            </form>
                        </div>
                        <div class="glass-card p-2">
                            <div class="flex flex-between align-center mb-1-5">
                                <h3><i class="fas fa-list-check text-primary mr-0-5"></i> Exam Terms</h3>
                                <p class="text-xs text-muted">Defined assessments for this session</p>
                            </div>
                            <div class="table-container">
                                <table class="portal-table">
                                    <thead>
                                        <tr>
                                            <th>Assessment Name</th>
                                            <th>Weightage</th>
                                            <th class="text-right">Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody id="examsTableBody">
                                        <!-- Populated via JS -->
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </section>
