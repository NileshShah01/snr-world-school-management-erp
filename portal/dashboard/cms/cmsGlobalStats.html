<section id="cmsGlobalStatsSection" class="dashboard-section hidden">
                    <div class="card">
                        <h3><i class="fas fa-chart-bar"></i> Global School Statistics</h3>
                        <p class="text-xs text-muted mb-1-5">
                            Update the statistics (Students, Teachers, etc.) that appear on Home, Academics, and
                            Facilities pages.
                        </p>

                        <form id="cmsGlobalStatsForm">
                            <div class="grid-cols-2 gap-1">
                                <div class="form-group">
                                    <label>Total Students</label>
                                    <input
                                        type="number"
                                        id="statsStudents"
                                        placeholder="e.g. 300"
                                        class="form-control"
                                        title="Total Students"
                                    />
                                </div>
                                <div class="form-group">
                                    <label>Expert Teachers</label>
                                    <input
                                        type="number"
                                        id="statsTeachers"
                                        placeholder="e.g. 15"
                                        class="form-control"
                                        title="Expert Teachers"
                                    />
                                </div>
                                <div class="form-group">
                                    <label>Smart Classrooms</label>
                                    <input
                                        type="number"
                                        id="statsClassrooms"
                                        placeholder="e.g. 12"
                                        class="form-control"
                                        title="Smart Classrooms"
                                    />
                                </div>
                                <div class="form-group">
                                    <label>Years of Excellence</label>
                                    <input
                                        type="number"
                                        id="statsYears"
                                        placeholder="e.g. 10"
                                        class="form-control"
                                        title="Years of Excellence"
                                    />
                                </div>
                            </div>
                            <button type="submit" class="btn-portal btn-primary mt-1-5" title="Save Global Statistics">
                                <i class="fas fa-save"></i> Save Global Statistics
                            </button>
                        </form>
                    </div>
                </section>
