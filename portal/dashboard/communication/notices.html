<section id="noticesSection" class="dashboard-section hidden">
                    <div class="grid-cols-1-2">
                        <div class="card">
                            <h3>Publish Notice</h3>
                            <form id="noticeForm" class="mt-1-5">
                                <div class="form-group">
                                    <label>Title</label>
                                    <input
                                        type="text"
                                        id="noticeTitle"
                                        required
                                        class="form-control"
                                        title="Notice Title"
                                        placeholder="Enter Title"
                                    />
                                </div>
                                <div class="form-group">
                                    <label>Message</label>
                                    <textarea
                                        id="noticeMessage"
                                        rows="5"
                                        required
                                        class="form-control"
                                        title="Notice Message"
                                        placeholder="Type message here..."
                                    ></textarea>
                                </div>
                                <button type="submit" class="btn-portal btn-primary w-full" title="Publish Notice">
                                    Publish
                                </button>
                            </form>
                        </div>
                        <div class="card">
                            <h3>Notice History</h3>
                            <div id="adminNoticesContainer" class="mt-1-5"></div>
                        </div>
                    </div>
                </section>
