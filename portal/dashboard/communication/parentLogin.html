<section id="parentLoginSection" class="dashboard-section hidden">
                    <div class="header">
                        <div>
                            <h1><i class="fas fa-user-lock primary"></i> Manage Parent Login</h1>
                            <p>Create and manage parent portal access credentials for students</p>
                        </div>
                    </div>

                    <div class="card mb-2 p-1-5 border-left-primary-thick">
                        <div class="mb-1-5">
                            <div class="flex gap-1 mb-1">
                                <label class="radio-inline">
                                    <input type="radio" name="parentLoginSearchType" value="phone" checked onchange="document.getElementById('parentLoginPhoneSearch').style.display='block';document.getElementById('parentLoginClassSearch').style.display='none';parentLoginSearchType='phone'" />
                                    <span class="text-sm font-500 ml-0-25">Search by Phone</span>
                                </label>
                                <label class="radio-inline">
                                    <input type="radio" name="parentLoginSearchType" value="class" onchange="document.getElementById('parentLoginPhoneSearch').style.display='none';document.getElementById('parentLoginClassSearch').style.display='block';parentLoginSearchType='class'" />
                                    <span class="text-sm font-500 ml-0-25">Search by Class</span>
                                </label>
                            </div>
                            <div id="parentLoginPhoneSearch">
                                <div class="form-group m-0">
                                    <label>Student Phone Number</label>
                                    <input type="text" id="parentLoginPhone" class="form-control" placeholder="Enter phone number to search..." />
                                </div>
                            </div>
                            <div id="parentLoginClassSearch" style="display:none">
                                <div class="grid-3 gap-1">
                                    <div class="form-group">
                                        <label>Session</label>
                                        <select id="parentLoginSession" class="form-control"><option value="">All Sessions</option></select>
                                    </div>
                                    <div class="form-group">
                                        <label>Class</label>
                                        <select id="parentLoginClass" class="form-control"><option value="">Select Class</option></select>
                                    </div>
                                    <div class="form-group">
                                        <label>Section</label>
                                        <select id="parentLoginSection" class="form-control"><option value="">All Sections</option></select>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div>
                            <label class="text-sm font-500 mb-0-25 block">Quick Student Select</label>
                            <div id="parentLoginStudentSelect" class="form-control"></div>
                            <input type="hidden" id="parentLoginStudentId" />
                            <input type="hidden" id="parentLoginStudentName" />
                        </div>
                    </div>

                    <div id="parentLoginResults" class="card p-0 overflow-hidden">
                        <div class="p-4 text-center text-slate-muted">
                            <i class="fas fa-search text-3xl opacity-01 mb-1"></i>
                            <p>Search for students to manage their parent login access.</p>
                        </div>
                    </div>

                    <!-- Parent Login Modal -->
                    <div id="plModalOverlay" class="modal-overlay hidden"></div>
                    <div id="plModal" class="modal-overlay hidden" style="background:transparent;pointer-events:none;">
                        <div class="modal-content modal-lg" style="max-width:560px;max-height:90vh;overflow-y:auto;pointer-events:auto;">
                            <div class="flex flex-between align-center mb-1-5">
                                <h3 id="plModalTitle" class="m-0 text-lg">Create Parent Login</h3>
                                <button class="btn-portal btn-ghost btn-sm" onclick="closeParentLoginModal()"><i class="fas fa-times"></i></button>
                            </div>
                            <div class="flex-col gap-1-25">
                                <div class="card bg-slate-50 p-1 border-left-primary-thick">
                                    <div class="flex-between mb-0-5">
                                        <p class="text-xs text-muted m-0">Linked Students</p>
                                        <button onclick="plOpenAddStudent()" class="btn-portal btn-sm btn-primary" type="button" style="padding:2px 8px;font-size:0.7rem;"><i class="fas fa-plus"></i> Add</button>
                                    </div>
                                    <div id="plLinkedStudents">
                                        <div class="flex-between p-0-5 border-bottom" data-student-id="">
                                            <span class="font-700 text-sm" id="plStudentNameDisplay">Loading...</span>
                                            <button onclick="plRemoveStudent(this)" class="btn-portal btn-sm btn-ghost" style="padding:2px 6px;font-size:0.65rem;color:var(--danger);"><i class="fas fa-times"></i></button>
                                        </div>
                                    </div>
                                    <input type="hidden" id="plDocId" />
                                </div>

                                <!-- Add Student Search (hidden by default) -->
                                <div id="plAddStudentSearch" class="card p-1 border-left-primary-thick hidden">
                                    <div class="flex-between mb-0-5">
                                        <p class="text-xs text-muted m-0">Search Student to Add</p>
                                        <button onclick="document.getElementById('plAddStudentSearch').classList.add('hidden')" class="btn-portal btn-sm btn-ghost" type="button" style="padding:2px 8px;font-size:0.7rem;"><i class="fas fa-times"></i></button>
                                    </div>
                                    <div class="flex gap-0-5">
                                        <input type="text" id="plAddStudentInput" class="form-control" placeholder="Type student name or phone..." style="font-size:0.8rem;" oninput="plSearchStudentsToAdd(this.value)" />
                                    </div>
                                    <div id="plAddStudentResults" class="mt-0-5 flex-col gap-0-25" style="max-height:150px;overflow-y:auto;"></div>
                                </div>

                                <div class="grid-2 gap-1">
                                    <div class="form-group m-0">
                                        <label>Parent/Guardian Name</label>
                                        <input type="text" id="plParentName" class="form-control" placeholder="Parent name" />
                                    </div>
                                    <div class="form-group m-0">
                                        <label>Relation</label>
                                        <select id="plRelation" class="form-control">
                                            <option value="Father">Father</option>
                                            <option value="Mother">Mother</option>
                                            <option value="Guardian">Guardian</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="grid-2 gap-1">
                                    <div class="form-group m-0">
                                        <label>Username</label>
                                        <input type="text" id="plUsername" class="form-control" placeholder="Username for login" />
                                    </div>
                                    <div class="form-group m-0">
                                        <label>Password</label>
                                        <div class="flex gap-0-5">
                                            <input type="text" id="plPassword" class="form-control" placeholder="Min 6 characters" />
                                            <button onclick="generatePassword()" class="btn-portal btn-sm btn-secondary" title="Generate Password"><i class="fas fa-key"></i></button>
                                        </div>
                                    </div>
                                </div>

                                <div class="flex align-center gap-1">
                                    <label class="flex align-center gap-0-5 cursor-pointer">
                                        <input type="checkbox" id="plStatus" checked />
                                        <span class="text-sm font-500">Active</span>
                                    </label>
                                </div>

                                <div>
                                    <label class="text-sm font-500 mb-0-5 block">Section Access Control</label>
                                    <div class="flex align-center gap-0-5 mb-0-5">
                                        <input type="checkbox" id="plAllSections" checked onchange="toggleAllParentLoginSections(this.checked)" />
                                        <span class="text-sm">Grant access to all sections</span>
                                    </div>
                                    <div class="grid-3 gap-0-5 p-1 bg-slate-50 border-radius-0-5">
                                        <label class="flex align-center gap-0-5 text-sm"><input type="checkbox" class="pl-section-checkbox" value="dashboard" checked /> Dashboard</label>
                                        <label class="flex align-center gap-0-5 text-sm"><input type="checkbox" class="pl-section-checkbox" value="fees" checked /> Fees & Receipts</label>
                                        <label class="flex align-center gap-0-5 text-sm"><input type="checkbox" class="pl-section-checkbox" value="attendance" checked /> Attendance</label>
                                        <label class="flex align-center gap-0-5 text-sm"><input type="checkbox" class="pl-section-checkbox" value="homework" checked /> Assignments</label>
                                        <label class="flex align-center gap-0-5 text-sm"><input type="checkbox" class="pl-section-checkbox" value="exams" checked /> Exams & Results</label>
                                        <label class="flex align-center gap-0-5 text-sm"><input type="checkbox" class="pl-section-checkbox" value="profile" checked /> Profile</label>
                                        <label class="flex align-center gap-0-5 text-sm"><input type="checkbox" class="pl-section-checkbox" value="transport" checked /> Transport</label>
                                        <label class="flex align-center gap-0-5 text-sm"><input type="checkbox" class="pl-section-checkbox" value="library" checked /> Library</label>
                                        <label class="flex align-center gap-0-5 text-sm"><input type="checkbox" class="pl-section-checkbox" value="certificates" checked /> Certificates</label>
                                        <label class="flex align-center gap-0-5 text-sm"><input type="checkbox" class="pl-section-checkbox" value="materials" checked /> Resources</label>
                                        <label class="flex align-center gap-0-5 text-sm"><input type="checkbox" class="pl-section-checkbox" value="results" checked /> Report Card</label>
                                    </div>
                                </div>

                                <div class="flex gap-0-75 justify-flex-end mt-1 pt-1 border-top">
                                    <button id="plDeleteBtn" onclick="confirmDeleteParentLogin(document.getElementById('plDocId').value)" class="btn-portal btn-danger btn-sm" style="display:none;margin-right:auto;"><i class="fas fa-trash"></i> Delete</button>
                                    <button class="btn-portal btn-ghost" onclick="closeParentLoginModal()">Cancel</button>
                                    <button class="btn-portal btn-primary" onclick="saveParentLogin()"><i class="fas fa-save"></i> Save Login</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
