<section id="studentRfidUpdateSection" class="dashboard-section hidden">
                    <div class="header">
                        <div>
                            <h1>Student RFID Update</h1>
                            <p>Update RFID numbers for student identification cards</p>
                        </div>
                    </div>

                    <div class="card mb-1-5">
                        <div class="grid-3 gap-1-25">
                            <div class="form-group">
                                <label>Session</label>
                                <select
                                    id="rfid_student_session"
                                    onchange="loadClassesForRfidUpdate()"
                                    class="form-control"
                                    title="Session"
                                ></select>
                            </div>
                            <div class="form-group">
                                <label>Class</label>
                                <select
                                    id="rfid_student_class"
                                    onchange="
                                        loadSectionsForRfidUpdate();
                                        loadStudentsForRfidUpdate();
                                    "
                                    class="form-control"
                                    title="Class"
                                >
                                    <option value="">Select Session First</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Section</label>
                                <select
                                    id="rfid_student_section"
                                    onchange="loadStudentsForRfidUpdate()"
                                    class="form-control"
                                    title="Section"
                                >
                                    <option value="">Select Class First</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="card p-0 overflow-hidden">
                        <div class="table-responsive">
                            <table class="portal-table">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Student Name</th>
                                        <th>Class/Sec</th>
                                        <th>Current RFID No</th>
                                        <th>New RFID No</th>
                                    </tr>
                                </thead>
                                <tbody id="rfidUpdateTableBody">
                                    <tr>
                                        <td colspan="5" class="text-center p-3 text-slate-muted">
                                            <i class="fas fa-wifi text-2xl opacity-03 mb-1 block"></i>
                                            Select Session, Class and Section to load students
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                    <div class="mt-1-5">
                        <button class="btn-portal btn-primary" onclick="saveRfidUpdates()" title="Save RFID Updates">
                            <i class="fas fa-save"></i> Save All RFID Updates
                        </button>
                    </div>
                </section>
