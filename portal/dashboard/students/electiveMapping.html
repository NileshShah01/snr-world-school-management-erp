<section id="electiveMappingSection" class="dashboard-section hidden">
                    <div class="header">
                        <div>
                            <h1>Elective Subject Mapping</h1>
                            <p>Assign elective subjects to specific students</p>
                        </div>
                    </div>
                    <div class="card p-1-5">
                        <div class="grid-cols-auto-200 gap-1-25 align-flex-end">
                            <div class="form-group m-0">
                                <label>Select Session</label>
                                <select
                                    id="electiveSessionSelect"
                                    class="form-control"
                                    onchange="loadClassesForElectives()"
                                    title="Select Session"
                                ></select>
                            </div>
                            <div class="form-group m-0">
                                <label>Select Class</label>
                                <select
                                    id="electiveClassSelect"
                                    class="form-control"
                                    onchange="loadStudentsForElectives()"
                                    title="Select Class"
                                ></select>
                            </div>
                            <div class="form-group m-0">
                                <label>Select Subject</label>
                                <select id="electiveSubjectSelect" class="form-control" title="Select Subject"></select>
                            </div>
                            <button
                                onclick="handleBulkElectiveMapping()"
                                class="btn-portal btn-primary mb-1-25 h-42"
                                title="Map Students"
                            >
                                <i class="fas fa-link"></i> Map Students
                            </button>
                        </div>

                        <div class="mt-2">
                            <h3>Students List</h3>
                            <div class="table-responsive mt-1">
                                <table class="portal-table">
                                    <thead>
                                        <tr>
                                            <th>
                                                <input
                                                    type="checkbox"
                                                    id="selectAllElectiveStudents"
                                                    onchange="toggleAllElectiveStudents(this)"
                                                    title="Select All"
                                                />
                                            </th>
                                            <th>Roll No</th>
                                            <th>Student Name</th>
                                            <th>Current Electives</th>
                                        </tr>
                                    </thead>
                                    <tbody id="electiveStudentsTableBody">
                                        <!-- Dynamic content -->
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </section>
