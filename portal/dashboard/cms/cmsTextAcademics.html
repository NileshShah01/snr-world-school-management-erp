<section id="cmsTextAcademicsSection" class="dashboard-section hidden">
                    <div class="card">
                        <h3><i class="fas fa-graduation-cap"></i> Academics Page Text Customization</h3>
                        <form id="cmsTextAcademicsForm">
                            <div class="form-group">
                                <label>Header Subtitle</label
                                ><input
                                    type="text"
                                    id="textAcademicsHeaderSubtitle"
                                    class="form-control"
                                    title="Header Subtitle"
                                />
                            </div>
                            <div class="form-group">
                                <label>Focus: Play Group</label
                                ><input
                                    type="text"
                                    id="textAcademicsFocusPlay"
                                    class="form-control"
                                    title="Focus: Play Group"
                                />
                            </div>
                            <div class="form-group">
                                <label>Focus: Primary Classes</label
                                ><input
                                    type="text"
                                    id="textAcademicsFocusPrimary"
                                    class="form-control"
                                    title="Focus: Primary Classes"
                                />
                            </div>
                            <div class="form-group">
                                <label>Focus: Middle Classes</label
                                ><input
                                    type="text"
                                    id="textAcademicsFocusMiddle"
                                    class="form-control"
                                    title="Focus: Middle Classes"
                                />
                            </div>
                            <div class="grid-2 gap-1 mb-1">
                                <div class="form-group">
                                    <label>Exam 1</label>
                                    <input type="text" id="textAcademicsExam1" class="form-control" title="Exam 1" />
                                </div>
                                <div class="form-group">
                                    <label>Exam 2</label>
                                    <input type="text" id="textAcademicsExam2" class="form-control" title="Exam 2" />
                                </div>
                                <div class="form-group">
                                    <label>Exam 3</label>
                                    <input type="text" id="textAcademicsExam3" class="form-control" title="Exam 3" />
                                </div>
                                <div class="form-group">
                                    <label>Exam 4</label>
                                    <input type="text" id="textAcademicsExam4" class="form-control" title="Exam 4" />
                                </div>
                            </div>

                            <div class="card bg-slate-light mb-1">
                                <h4 class="mb-1">Call to Action (Admissions)</h4>
                                <div class="form-group">
                                    <label>CTA Title</label>
                                    <input
                                        type="text"
                                        id="textAcademicsCtaTitle"
                                        class="form-control"
                                        title="CTA Title"
                                    />
                                </div>
                                <div class="form-group">
                                    <label>CTA Subtitle</label>
                                    <input
                                        type="text"
                                        id="textAcademicsCtaSubtitle"
                                        class="form-control"
                                        title="CTA Subtitle"
                                    />
                                </div>
                                <div class="form-group">
                                    <label>CTA Button Text</label>
                                    <input
                                        type="text"
                                        id="textAcademicsCtaBtn"
                                        class="form-control"
                                        title="CTA Button Text"
                                    />
                                </div>
                            </div>

                            <button
                                type="submit"
                                class="btn-portal btn-primary w-full"
                                title="Save Academics Page Text"
                            >
                                <i class="fas fa-save"></i> Save Academics Page Text
                            </button>
                        </form>
                    </div>
                </section>
