<div class="text-center mb-3">
    <div class="icon-box bg-amber-opacity-10 text-amber mx-auto mb-1-5 icon-box-xl-rounded">
        <i class="fas fa-database"></i>
    </div>
    <h2 class="text-secondary text-3xl font-800 mb-0-5">Legacy Data Migration</h2>
    <p class="text-muted max-w-600 mx-auto">
        One-time tool to copy data from legacy top-level collections into school-scoped subcollections.
    </p>
</div>

<div class="card p-2 mb-2" id="legacyError" style="display:none;border-left:4px solid #ef4444;">
    <i class="fas fa-exclamation-triangle text-red"></i>
    <span id="legacyErrorMsg"></span>
</div>

<div class="card p-2 mb-2">
    <div class="flex justify-between align-center mb-1">
        <h3 class="text-lg font-700"><i class="fas fa-list"></i> Legacy Collections</h3>
        <button id="legacyRefreshBtn" class="btn btn-sm btn-outline" onclick="lmRefreshStatus()">
            <i class="fas fa-sync-alt"></i> Refresh
        </button>
    </div>
    <div id="legacyCollectionList">
        <p class="text-muted text-center p-2"><i class="fas fa-spinner fa-spin"></i> Loading...</p>
    </div>
</div>

<div class="card p-2 mb-2" id="legacyProgressCard" style="display:none;">
    <h3 class="text-lg font-700 mb-1"><i class="fas fa-tasks"></i> Migration Progress</h3>
    <div id="legacyProgressContent"></div>
</div>

<div class="card p-2">
    <div class="flex gap-1">
        <button id="legacyMigrateBtn" class="btn btn-primary" onclick="lmStartMigration()">
            <i class="fas fa-play"></i> Start Migration
        </button>
        <button id="legacyDeleteBtn" class="btn btn-danger" onclick="lmDeleteOriginals()" disabled>
            <i class="fas fa-trash-alt"></i> Delete Originals
        </button>
        <button id="legacyVerifyBtn" class="btn btn-outline" onclick="lmVerifyMigration()">
            <i class="fas fa-check-circle"></i> Verify
        </button>
    </div>
    <p class="text-xs text-muted mt-1">
        <i class="fas fa-info-circle"></i> Migrate copies data into school subcollections. Delete removes originals after verification.
    </p>
</div>

<div class="card p-2 mt-2" id="legacyLogCard" style="display:none;">
    <h3 class="text-lg font-700 mb-1"><i class="fas fa-clipboard-list"></i> Migration Log</h3>
    <div id="legacyLog" class="text-xs" style="max-height:300px;overflow-y:auto;background:#1e293b;color:#e2e8f0;padding:1rem;border-radius:0.5rem;font-family:monospace;white-space:pre-wrap;"></div>
</div>
