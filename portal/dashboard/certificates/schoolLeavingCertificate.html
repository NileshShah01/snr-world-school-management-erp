<section id="schoolLeavingCertificateSection" class="dashboard-section hidden">
                <div class="header">
                    <div>
                        <h1><i class="fas fa-file-signature text-primary"></i> School Leaving Certificate</h1>
                        <p>Generate detailed SLC for students leaving the school</p>
                    </div>
                </div>
                <div class="card p-2 max-w-900">
                    <div class="grid-3 gap-1 mb-1-5">
                        <div class="form-group">
                            <label>Session *</label>
                            <select id="cert_slc_session" class="form-control" onchange="loadCertClasses('slc')"></select>
                        </div>
                        <div class="form-group">
                            <label>Class *</label>
                            <select id="cert_slc_class" class="form-control" onchange="loadCertSections('slc')"></select>
                        </div>
                        <div class="form-group">
                            <label>Section</label>
                            <select id="cert_slc_section" class="form-control" onchange="loadCertStudents('slc')"></select>
                        </div>
                    </div>
                    <div class="form-group mb-1-5">
                        <label>Student *</label>
                        <select id="cert_slc_student" class="form-control" onchange="populateCertStudent('slc')"></select>
                    </div>
                    <h3 class="text-muted mb-1"><i class="fas fa-user"></i> Personal Details (auto-filled)</h3>
                    <div class="grid-2 gap-1-5 mb-1-5">
                        <div class="form-group">
                            <label>Name</label>
                            <input type="text" id="cert_slc_name" class="form-control" readonly />
                        </div>
                        <div class="form-group">
                            <label>Father's Name</label>
                            <input type="text" id="cert_slc_father" class="form-control" readonly />
                        </div>
                        <div class="form-group">
                            <label>Date of Birth</label>
                            <input type="date" id="cert_slc_dob" class="form-control" readonly />
                        </div>
                        <div class="form-group">
                            <label>Admission Date</label>
                            <input type="date" id="cert_slc_admission" class="form-control" readonly />
                        </div>
                    </div>
                    <h3 class="text-muted mb-1"><i class="fas fa-edit"></i> Certificate Details</h3>
                    <div class="grid-2 gap-1-5 mb-1-5">
                        <div class="form-group">
                            <label>Date of Leaving *</label>
                            <input type="date" id="cert_slc_leaving_date" class="form-control" />
                        </div>
                        <div class="form-group">
                            <label>Character / Conduct</label>
                            <select id="cert_slc_character" class="form-control">
                                <option value="Excellent">Excellent</option>
                                <option value="Good" selected>Good</option>
                                <option value="Average">Average</option>
                                <option value="Needs Improvement">Needs Improvement</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Probable Attendance (%)</label>
                            <input type="number" id="cert_slc_attendance_p" class="form-control" placeholder="e.g. 95" />
                        </div>
                        <div class="form-group">
                            <label>Actual Attendance (%)</label>
                            <input type="number" id="cert_slc_attendance_r" class="form-control" placeholder="e.g. 92" />
                        </div>
                        <div class="form-group">
                            <label>Due Amount (₹)</label>
                            <input type="number" id="cert_slc_due" class="form-control" readonly />
                            <small id="cert_slc_due_hint" class="text-muted"></small>
                        </div>
                        <div class="form-group">
                            <label>Extra-curricular Activities</label>
                            <input type="text" id="cert_slc_extra" class="form-control" placeholder="Sports, Music, NCC, etc." />
                        </div>
                    </div>
                    <div class="form-group mb-1-5">
                        <label>Reason for Leaving *</label>
                        <input type="text" id="cert_slc_reason" class="form-control" placeholder="e.g. Father transferred, Class 10 completed, etc." />
                    </div>
                    <div class="form-group mb-1-5">
                        <label>Ref No (auto)</label>
                        <input type="text" id="cert_slc_refno" class="form-control" readonly placeholder="Auto-generated on Generate" />
                    </div>
                    <div class="flex gap-1">
                        <button class="btn-portal btn-primary" onclick="generateCertificate('slc')">
                            <i class="fas fa-magic"></i> Generate SLC
                        </button>
                        <button class="btn-portal btn-secondary" onclick="clearCertFields('slc')">
                            <i class="fas fa-eraser"></i> Reset
                        </button>
                    </div>
                </div>
            </section>
