<section id="teacherTimetablesSection" class="dashboard-section card hidden">
    <div class="header mb-2">
        <div>
            <h1>Teacher Timetables</h1>
            <p>View teacher-wise schedules across all classes</p>
        </div>
    </div>
    <div class="glass-card p-1-5 mb-2 grid-2 gap-1 align-flex-end" style="max-width:600px;">
        <div class="form-group mb-0">
            <label>Session</label>
            <select id="ttSessionSelect" class="form-control" onchange="initERPTimetable()" title="Select Session"></select>
        </div>
        <div class="form-group mb-0">
            <label>Teacher</label>
            <select id="ttTeacherSelect" class="form-control" title="Select Teacher">
                <option value="">Select Teacher</option>
            </select>
        </div>
    </div>
    <div class="table-container">
        <div class="table-responsive">
            <table class="portal-table" style="min-width:800px;">
                <thead>
                    <tr>
                        <th style="width:100px;">Day / Period</th>
                        <th>Period 1</th>
                        <th>Period 2</th>
                        <th>Period 3</th>
                        <th>Period 4</th>
                        <th>Period 5</th>
                        <th>Period 6</th>
                        <th>Period 7</th>
                        <th>Period 8</th>
                    </tr>
                </thead>
                <tbody id="teacherTimetableBody">
                    <tr><td colspan="9" class="text-center text-muted py-4">Select a teacher to view their timetable.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</section>
