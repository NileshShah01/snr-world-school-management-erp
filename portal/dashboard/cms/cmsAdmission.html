<section id="cmsAdmissionSection" class="dashboard-section card hidden">
                    <h3><i class="fas fa-door-open"></i> Admission Status</h3>
                    <p class="text-sm text-muted mb-2">
                        Toggle whether admissions are currently open or closed. This changes the live badge on the
                        website.
                    </p>
                    <div class="flex align-center gap-2 p-2 bg-secondary border-radius-1">
                        <div
                            id="admissionStatusBadge"
                            class="text-2xl font-800 p-1-2 border-radius-0-75 bg-success text-white"
                        >
                            OPEN
                        </div>
                        <div>
                            <p class="font-700 mb-0-5">
                                Current Status: <span id="admissionStatusText">Loading...</span>
                            </p>
                            <p class="text-sm text-muted mb-1">
                                Changing this will update the website homepage immediately.
                            </p>
                            <div class="flex gap-1">
                                <button
                                    class="btn-portal btn-success"
                                    onclick="setAdmissionStatus('open')"
                                    title="Set Admissions Open"
                                >
                                    <i class="fas fa-door-open"></i> Set OPEN
                                </button>
                                <button
                                    class="btn-portal btn-danger"
                                    onclick="setAdmissionStatus('closed')"
                                    title="Set Admissions Closed"
                                >
                                    <i class="fas fa-door-closed"></i> Set CLOSED
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="mt-1-5 p-1 bg-secondary border-radius-0-75">
                        <label class="font-700 block mb-0-5">Session Year Displayed (e.g. 2026-2027)</label>
                        <div class="flex gap-1 align-center">
                            <input
                                type="text"
                                id="admissionSessionYear"
                                placeholder="2026-2027"
                                class="form-control flex-1 h-fit"
                                title="Enter Session Year"
                            />
                            <button
                                class="btn-portal btn-primary"
                                onclick="saveAdmissionSession()"
                                title="Save Session Year"
                            >
                                <i class="fas fa-save"></i> Save
                            </button>
                        </div>
                    </div>
                </section>
