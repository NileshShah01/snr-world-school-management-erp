<section id="cmsTextAboutSection" class="dashboard-section hidden">
                    <div class="card">
                        <h3><i class="fas fa-info-circle"></i> About Page Text Customization</h3>
                        <form id="cmsTextAboutForm">
                            <div class="form-group">
                                <label>Vision Statement</label
                                ><textarea
                                    id="textAboutVision"
                                    rows="3"
                                    class="form-control"
                                    title="Vision Statement"
                                ></textarea>
                            </div>
                            <div class="form-group">
                                <label>Mission Statement</label
                                ><textarea
                                    id="textAboutMission"
                                    rows="3"
                                    class="form-control"
                                    title="Mission Statement"
                                ></textarea>
                            </div>
                            <div class="form-group">
                                <label>Principal's Message Content (HTML allowed)</label
                                ><textarea
                                    id="textAboutPrincipalContent"
                                    rows="5"
                                    class="form-control"
                                    title="Principal's Message"
                                ></textarea>
                            </div>
                            <div class="form-group">
                                <label>Principal's Name</label
                                ><input
                                    type="text"
                                    id="textAboutPrincipalName"
                                    class="form-control"
                                    title="Principal's Name"
                                />
                            </div>
                            <button type="submit" class="btn-portal btn-primary mt-1-5" title="Save About Page Text">
                                <i class="fas fa-save"></i> Save About Page Text
                            </button>
                        </form>
                    </div>
                </section>
