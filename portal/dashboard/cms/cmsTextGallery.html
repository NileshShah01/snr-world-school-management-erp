<section id="cmsTextGallerySection" class="dashboard-section hidden">
                    <div class="card">
                        <h3><i class="fas fa-images"></i> Gallery Page Text Customization</h3>
                        <form id="cmsTextGalleryForm">
                            <div class="form-group">
                                <label>Header Title</label
                                ><input
                                    type="text"
                                    id="textGalleryHeaderTitle"
                                    class="form-control"
                                    title="Header Title"
                                />
                            </div>
                            <div class="form-group">
                                <label>Header Subtitle</label
                                ><textarea
                                    id="textGalleryHeaderSubtitle"
                                    rows="2"
                                    class="form-control"
                                    title="Header Subtitle"
                                ></textarea>
                            </div>
                            <button type="submit" class="btn-portal btn-primary mt-1-5" title="Save Gallery Text">
                                <i class="fas fa-save"></i> Save Gallery Page Text
                            </button>
                        </form>
                    </div>
                </section>
