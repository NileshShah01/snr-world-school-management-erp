<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="recaptcha-site-key" content="" />

        <title>Contact | <span data-school-field="schoolName">School</span></title>

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
        <link rel="stylesheet" href="/style.css" />

        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

        <style>
            body {
                background: var(--bg-gray);
                color: var(--text-main);
            }

            .page-header {
                text-align: center;
                padding: 5rem 2rem;
                background: var(--glass-bg);
                -webkit-backdrop-filter: blur(10px);
                backdrop-filter: blur(10px);
                margin-bottom: 2rem;
            }

            .page-header h1 {
                font-size: 3rem;
                font-weight: 800;
                color: var(--primary);
            }

            /* General section styling, if not already in style.css */
            .section {
                max-width: 1100px;
                margin: auto;
                padding: 50px 20px;
                background: rgba(
                    255,
                    255,
                    255,
                    0.95
                ); /* Using a specific rgba for consistency with old style, can be replaced by var(--white) or var(--glass-bg) if desired */
                border-radius: 6px;
                margin-bottom: 30px;
            }

            .section-title {
                text-align: center;
                font-size: 2.25rem;
                font-weight: 700;
                color: var(--primary);
                margin-bottom: 2.5rem;
            }

            .contact-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
                gap: 2rem;
                margin-bottom: 4rem;
            }

            .card {
                background: var(--white);
                padding: 25px;
                text-align: center;
                border-radius: 6px;
                box-shadow: var(--shadow); /* Using a global shadow variable */
                transition: all 0.3s ease;
            }

            .card:hover {
                transform: translateY(-8px);
                box-shadow: var(--shadow-md); /* Slightly more pronounced shadow on hover */
            }

            .card i {
                font-size: 36px;
                color: var(--primary);
                margin-bottom: 10px;
            }

            .card h3 {
                font-size: 1.5rem;
                color: var(--text-main);
                margin-bottom: 0.5rem;
            }

            .card p {
                font-size: 1rem;
                color: var(--text-secondary);
            }

            .social-links {
                display: flex;
                justify-content: center;
                gap: 2rem;
                margin-top: 2rem;
            }

            .social-links a {
                font-size: 2rem;
                color: var(--primary);
                transition: all 0.3s ease;
            }

            .social-links a:hover {
                color: var(--secondary);
                transform: translateY(-5px);
            }

            .form-container {
                max-width: 800px;
                margin: 0 auto;
                background: var(--white);
                padding: 3rem;
                border-radius: 1.5rem;
                box-shadow: var(--shadow-lg);
            }

            .form-group {
                margin-bottom: 1.5rem;
            }

            .form-group label {
                display: block;
                margin-bottom: 0.5rem;
                font-weight: 600;
                color: var(--text-main);
            }

            .form-control {
                width: 100%;
                padding: 1rem;
                border: 1px solid var(--border);
                border-radius: 0.75rem;
                font-size: 1rem;
                transition: all 0.3s ease;
                background: var(--bg-gray);
            }

            .form-control:focus {
                outline: none;
                border-color: var(--primary);
                background: var(--white);
                box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.1);
            }

            .btn-submit {
                width: 100%;
                padding: 1.25rem;
                background: var(--primary);
                color: var(--white);
                border: none;
                border-radius: 0.75rem;
                font-size: 1.1rem;
                font-weight: 700;
                cursor: pointer;
                transition: all 0.3s ease;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 0.75rem;
            }

            .btn-submit:hover {
                background: var(--secondary);
                transform: translateY(-2px);
                box-shadow: var(--shadow);
            }
        </style>
    </head>

    <body>
        <div id="header"></div>

        <section class="page-header">
            <h1>Contact <span data-school-field="schoolName">School</span></h1>

            <p data-school-field="schoolLocation">Loading…</p>
        </section>

        <section class="reveal">
            <h2 class="section-title" data-i18n="contact.title">Contact Information</h2>
            <div class="grid">
                <div class="card">
                    <i class="fa-solid fa-phone"></i>
                    <h3>Phone</h3>
                    <p data-school-field="phone">—</p>
                </div>

                <div class="card">
                    <i class="fa-solid fa-envelope"></i>
                    <h3>Email</h3>
                    <p data-school-field="email">—</p>
                </div>

                <div class="card">
                    <i class="fa-solid fa-location-dot"></i>
                    <h3>Address</h3>
                    <p data-school-field="address_full">Loading…</p>
                </div>

                <div class="card">
                    <i class="fa-solid fa-clock"></i>
                    <h3>Office Hours</h3>
                    <p>
                        Monday – Saturday<br />
                        9:00 AM – 2:30 PM
                    </p>
                </div>
            </div>
        </section>

        <section class="reveal">
            <h2 class="section-title" data-i18n="contact.subtitle">Send Inquiry</h2>
            <div class="form-container">
                <form id="contactForm">
                    <div class="grid gap-md mb-3">
                        <div class="form-group mb-0">
                            <label data-i18n="contact.name">Name <span class="text-secondary">*</span></label>
                            <input type="text" id="con_name" class="form-control" required
                                data-i18n-attr="placeholder:contact.name|title:contact.name"
                                placeholder="Your name" title="Full Name" />
                        </div>
                        <div class="form-group mb-0">
                            <label data-i18n="contact.phone">Mobile Number <span class="text-secondary">*</span></label>
                            <input
                                type="tel"
                                id="con_mobile"
                                class="form-control"
                                required
                                data-i18n-attr="placeholder:contact.phone|title:contact.phone"
                                placeholder="10-digit number"
                                maxlength="10"
                                title="10-digit Mobile Number"
                            />
                        </div>
                    </div>
                    <div class="form-group">
                        <label data-i18n="contact.message">Message / Inquiry <span class="text-secondary">*</span></label>
                        <textarea
                            id="con_message"
                            class="form-control"
                            required
                            rows="4"
                            data-i18n-attr="placeholder:contact.message|title:contact.message"
                            placeholder="How can we help you?"
                            title="Message or Inquiry Description"
                        ></textarea>
                    </div>
                    <div id="con_status" class="status-box"></div>
                    <button type="submit" class="btn-submit" title="Send your message">
                        <i class="fa-solid fa-paper-plane"></i> <span data-i18n="contact.send">Send Message</span>
                    </button>
                </form>
            </div>
        </section>

        <section class="reveal">
            <h2 class="section-title">Follow Us</h2>
            <div class="social-links">
                <a href="#" title="Facebook" onclick="alert('Add your school Facebook page URL here');return false;"><i class="fa-brands fa-facebook"></i></a>
                <a href="#" title="Instagram" onclick="alert('Add your school Instagram page URL here');return false;"><i class="fa-brands fa-instagram"></i></a>
                <a href="#" title="YouTube" onclick="alert('Add your school YouTube channel URL here');return false;"><i class="fa-brands fa-youtube"></i></a>
            </div>
        </section>

        <div id="footer"></div>

        <!-- NEW FLOATING BUTTONS CONTAINER -->
        <script defer src="/script.js"></script>

        <!-- Firebase SDK for Inquiry Sync -->
        <script defer src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
        <script defer src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
        <script defer src="/js/app-check.js?v=1.0"></script>
        <script defer src="/js/firebase-config.js"></script>
        <script defer src="/js/i18n.js"></script>
        <script defer src="/js/media-loader.js?v=1.0"></script>
        <script defer src="/js/rate-limiter.js?v=1.0"></script>
        <script defer src="/js/cms-settings.js"></script>
        <script>
            document.addEventListener('DOMContentLoaded', function () {
                document.getElementById('contactForm')?.addEventListener('submit', async function (e) {
                    e.preventDefault();
                    const btn = this.querySelector('button[type="submit"]');
                    const status = document.getElementById('con_status');
                    const t = (window.SNR_I18N && window.SNR_I18N.t) || function (k, fb) { return fb || k; };
                    btn.disabled = true;
                    btn.textContent = 'Sending...';
                    status.style.display = 'none';

                    const mobile = document.getElementById('con_mobile').value.trim();
                    if (mobile.length !== 10 || isNaN(mobile)) {
                        status.style.display = 'block';
                        status.className = 'status-box status-error';
                        status.textContent = t('contact.err_mobile', 'Please enter a valid 10-digit mobile number.');
                        btn.disabled = false;
                        btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> ' + t('contact.send', 'Send Message');
                        return;
                    }

                    // Client-side rate limit: 2 inquiries per minute per mobile
                    const limiter = (window.SNR_RATE_LIMITERS && window.SNR_RATE_LIMITERS.inquiry) || null;
                    if (limiter) {
                        const r = limiter.check('contact:' + mobile);
                        if (!r.allowed) {
                            status.style.display = 'block';
                            status.className = 'status-box status-error';
                            status.textContent =
                                t('contact.err_rate', '⚠️ Too many submissions. Please wait a minute and try again.') +
                                ' (' + limiter.formatRetryAfter(r.retryAfterMs) + ')';
                            btn.disabled = false;
                            btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> ' + t('contact.send', 'Send Message');
                            return;
                        }
                    }

                    try {
                        await schoolData('inquiries').add({
                            schoolId: CURRENT_SCHOOL_ID,
                            parent: document.getElementById('con_name').value.trim(),
                            student: 'N/A (General Contact)',
                            mobile: mobile,
                            class: 'N/A',
                            village: 'N/A',
                            message: document.getElementById('con_message').value.trim(),
                            status: 'New',
                            submittedAt: firebase.firestore.FieldValue.serverTimestamp(),
                        });
                        if (limiter) limiter.reset('contact:' + mobile);
                        status.style.display = 'block';
                        status.className = 'status-box status-success';
                        status.textContent = t('contact.sent_ok', '✅ Message sent successfully! We will contact you soon.');
                        this.reset();
                    } catch (err) {
                        console.error('Contact form submission failed:', err);
                        if (limiter) limiter.allow('contact:' + mobile);
                        status.style.display = 'block';
                        status.className = 'status-box status-error';
                        status.textContent = t('contact.err_send', 'Failed to send message. Please try calling us instead.');
                    } finally {
                        btn.disabled = false;
                        btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> ' + t('contact.send', 'Send Message');
                    }
                });
            });
        </script>

        <script>
            /* BACKGROUND MOUSE MOVEMENT */

            document.addEventListener('mousemove', (e) => {
                let x = e.clientX / window.innerWidth;
                let y = e.clientY / window.innerHeight;

                document.body.style.backgroundPosition = `${x * 70}px ${y * 70}px`;
            });
        </script>
    </body>
</html>
