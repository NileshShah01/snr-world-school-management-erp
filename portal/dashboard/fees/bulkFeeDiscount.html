<section id="bulkFeeDiscountSection" class="dashboard-section card hidden">
                    <div class="header mb-1-5">
                        <div>
                            <h1><i class="fas fa-percent text-primary"></i> Bulk Fee Discount</h1>
                            <p>Apply discounts to pending fees for multiple students at once</p>
                        </div>
                    </div>
                    <div class="card max-w-600 mx-auto p-2">
                        <div class="form-group">
                            <label>Session</label>
                            <select id="bdSession" class="form-control" onchange="loadBulkDiscountClasses()" required>
                                <option value="">-- Select Session --</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Class</label>
                            <select id="bdClass" class="form-control" required>
                                <option value="">-- Select Class --</option>
                            </select>
                        </div>
                        <div class="grid-2 gap-1">
                            <div class="form-group">
                                <label>Fee Type (Optional - leave blank for all)</label>
                                <select id="bdFeeType" class="form-control">
                                    <option value="">All Fee Types</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Month (Optional - leave blank for all)</label>
                                <select id="bdMonth" class="form-control">
                                    <option value="">All Months</option>
                                    <option value="January">January</option>
                                    <option value="February">February</option>
                                    <option value="March">March</option>
                                    <option value="April">April</option>
                                    <option value="May">May</option>
                                    <option value="June">June</option>
                                    <option value="July">July</option>
                                    <option value="August">August</option>
                                    <option value="September">September</option>
                                    <option value="October">October</option>
                                    <option value="November">November</option>
                                    <option value="December">December</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Discount Amount (\u20B9)</label>
                            <input type="number" id="bdAmount" class="form-control" min="1" required placeholder="Enter discount amount">
                        </div>
                        <div class="form-group">
                            <label>Discount Type</label>
                            <select id="bdType" class="form-control">
                                <option value="fixed">Fixed Amount (\u20B9)</option>
                                <option value="percent">Percentage (%)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Remarks</label>
                            <input type="text" id="bdRemarks" class="form-control" placeholder="e.g. Scholarship discount, Festive offer">
                        </div>
                        <button class="btn-portal btn-primary w-full" onclick="applyBulkDiscount()">
                            <i class="fas fa-percent"></i> Apply Discount
                        </button>
                    </div>
                </section>
