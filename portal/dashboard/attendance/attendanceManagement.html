<section id="attendanceManagementSection" class="dashboard-section card hidden">
                    <div class="header mb-2">
                        <div>
                            <h1>Daily Attendance Marking</h1>
                            <p>Mark and track daily attendance for students</p>
                        </div>
                        <div class="header-actions">
                            <button class="btn-portal btn-ghost" onclick="downloadAttendanceTemplate()">
                                <i class="fas fa-download"></i> Download Template
                            </button>
                            <button
                                class="btn-portal btn-ghost"
                                onclick="document.getElementById('att_excelUpload').click()"
                            >
                                <i class="fas fa-file-excel"></i> Mark via Excel
                            </button>
                            <input
                                type="file"
                                id="att_excelUpload"
                                class="hidden"
                                accept=".xlsx, .xls"
                                onchange="handleAttendanceExcelUpload(event)"
                                title="Upload Attendance Excel"
                            />
                            <button class="btn-portal btn-ghost" onclick="markAllPresent()">
                                <i class="fas fa-check-double"></i> Mark All Present
                            </button>
                            <button class="btn-portal btn-primary" onclick="saveAttendance()">
                                <i class="fas fa-save"></i> Save Attendance
                            </button>
                        </div>
                    </div>

                    <div class="attendance-filter-row glass-card p-1-5 mb-2 grid-auto-150 gap-1 align-flex-end">
                        <div class="form-group mb-0">
                            <label>Session</label>
                            <select
                                id="att_sessionSelect"
                                class="form-control"
                                onchange="loadAttendanceClasses()"
                                title="Select Session"
                            ></select>
                        </div>
                        <div class="form-group mb-0">
                            <label>Class</label>
                            <select
                                id="att_classSelect"
                                class="form-control"
                                onchange="updateAttendanceSections()"
                                title="Select Class"
                            ></select>
                        </div>
                        <div class="form-group mb-0">
                            <label>Section</label>
                            <select id="att_sectionSelect" class="form-control" title="Select Section"></select>
                        </div>
                        <div class="form-group mb-0">
                            <label>Date</label>
                            <input type="date" id="att_dateInput" class="form-control" title="Select Date" />
                        </div>
                        <button
                            class="btn-portal btn-secondary h-42"
                            onclick="loadStudentsForAttendance()"
                            title="Load Students"
                        >
                            <i class="fas fa-search"></i> Load Students
                        </button>
                    </div>

                    <div class="table-container">
                        <table class="attendance-table">
                            <thead>
                                <tr>
                                    <th class="w-20">Roll No</th>
                                    <th>Student Name</th>
                                    <th class="w-80 text-center">Attendance Status</th>
                                    <th class="w-18">Sync</th>
                                </tr>
                            </thead>
                            <tbody id="attendanceTableBody">
                                <tr>
                                    <td colspan="4" class="text-center text-muted p-3">
                                        <i class="fas fa-users text-5xl opacity-01 block mb-1"></i>
                                        Select class and date to load students
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="mt-2 flex justify-flex-end gap-1">
                        <button class="btn-portal btn-ghost" onclick="showSection('dashboardOverview')" title="Cancel">
                            Cancel
                        </button>
                        <button
                            class="btn-portal btn-primary"
                            onclick="saveAttendance()"
                            title="Save Marked Attendance"
                        >
                            <i class="fas fa-save"></i> Save Attendance
                        </button>
                    </div>
                </section>
