<section id="cmsTextFacilitiesSection" class="dashboard-section hidden">
                    <div class="card">
                        <h3><i class="fas fa-building"></i> Facilities Page Text Customization</h3>
                        <form id="cmsTextFacilitiesForm">
                            <div class="form-group">
                                <label>Hero Subtitle</label
                                ><input
                                    type="text"
                                    id="textFacilitiesHeroSubtitle"
                                    class="form-control"
                                    title="Hero Subtitle"
                                />
                            </div>
                            <div class="form-group">
                                <label>Smart Classrooms Desc</label
                                ><textarea
                                    id="textFacilitiesDescSmart"
                                    rows="2"
                                    class="form-control"
                                    title="Smart Classrooms Description"
                                ></textarea>
                            </div>
                            <div class="form-group">
                                <label>Computer Lab Desc</label
                                ><textarea
                                    id="textFacilitiesDescComputer"
                                    rows="2"
                                    class="form-control"
                                    title="Computer Lab Description"
                                ></textarea>
                            </div>
                            <div class="form-group">
                                <label>Sports Ground Desc</label
                                ><textarea
                                    id="textFacilitiesDescSports"
                                    rows="2"
                                    class="form-control"
                                    title="Sports Ground Description"
                                ></textarea>
                            </div>
                            <div class="form-group">
                                <label>CCTV Security Desc</label
                                ><textarea
                                    id="textFacilitiesDescSecurity"
                                    rows="2"
                                    class="form-control"
                                    title="CCTV Security Description"
                                ></textarea>
                            </div>
                            <div class="form-group">
                                <label>School Transport Desc</label
                                ><textarea
                                    id="textFacilitiesDescTransport"
                                    rows="2"
                                    class="form-control"
                                    title="School Transport Description"
                                ></textarea>
                            </div>
                            <div class="form-group">
                                <label>Playground Desc</label
                                ><textarea
                                    id="textFacilitiesDescPlayground"
                                    rows="2"
                                    class="form-control"
                                    title="Playground Description"
                                ></textarea>
                            </div>
                            <button type="submit" class="btn-portal btn-primary mt-1-5" title="Save Facilities Text">
                                <i class="fas fa-save"></i> Save Facilities Page Text
                            </button>
                        </form>
                    </div>
                </section>
