<section id="transferCertificateSection" class="dashboard-section hidden">
                <div class="header">
                    <div>
                        <h1><i class="fas fa-exchange-alt text-primary"></i> Transfer Certificate</h1>
                        <p>Generate TC for transferring students</p>
                    </div>
                </div>
                <div class="card p-2 max-w-900">
                    <div class="grid-3 gap-1 mb-1-5">
                        <div class="form-group">
                            <label>Session *</label>
                            <select id="cert_tc_session" class="form-control" onchange="loadCertClasses('tc')"></select>
                        </div>
                        <div class="form-group">
                            <label>Class *</label>
                            <select id="cert_tc_class" class="form-control" onchange="loadCertSections('tc')"></select>
                        </div>
                        <div class="form-group">
                            <label>Section</label>
                            <select id="cert_tc_section" class="form-control" onchange="loadCertStudents('tc')"></select>
                        </div>
                    </div>
                    <div class="form-group mb-1-5">
                        <label>Student *</label>
                        <select id="cert_tc_student" class="form-control" onchange="populateCertStudent('tc')"></select>
                    </div>
                    <h3 class="text-muted mb-1"><i class="fas fa-user"></i> Personal Details (auto-filled)</h3>
                    <div class="grid-2 gap-1-5 mb-1-5">
                        <div class="form-group">
                            <label>Name</label>
                            <input type="text" id="cert_tc_name" class="form-control" readonly />
                        </div>
                        <div class="form-group">
                            <label>Father's Name</label>
                            <input type="text" id="cert_tc_father" class="form-control" readonly />
                        </div>
                        <div class="form-group">
                            <label>Mother's Name</label>
                            <input type="text" id="cert_tc_mother" class="form-control" readonly />
                        </div>
                        <div class="form-group">
                            <label>Date of Birth</label>
                            <input type="date" id="cert_tc_dob" class="form-control" readonly />
                        </div>
                        <div class="form-group">
                            <label>Admission Date</label>
                            <input type="date" id="cert_tc_admission" class="form-control" readonly />
                        </div>
                        <div class="form-group">
                            <label>Roll No</label>
                            <input type="text" id="cert_tc_roll" class="form-control" readonly />
                        </div>
                    </div>
                    <h3 class="text-muted mb-1"><i class="fas fa-edit"></i> Transfer Details</h3>
                    <div class="grid-2 gap-1-5 mb-1-5">
                        <div class="form-group">
                            <label>Date of Leaving *</label>
                            <input type="date" id="cert_tc_leaving_date" class="form-control" />
                        </div>
                        <div class="form-group">
                            <label>Conduct</label>
                            <select id="cert_tc_conduct" class="form-control">
                                <option value="Excellent">Excellent</option>
                                <option value="Good" selected>Good</option>
                                <option value="Average">Average</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Due Amount (₹)</label>
                            <input type="number" id="cert_tc_due" class="form-control" readonly />
                        </div>
                    </div>
                    <div class="form-group mb-1-5">
                        <label>Reason for Transfer *</label>
                        <input type="text" id="cert_tc_reason" class="form-control" placeholder="e.g. Father transferred to Delhi, Admission in new school, etc." />
                    </div>
                    <div class="form-group mb-1-5">
                        <label>Remarks</label>
                        <textarea id="cert_tc_remarks" class="form-control" rows="2"></textarea>
                    </div>
                    <div class="form-group mb-1-5">
                        <label>Ref No (auto)</label>
                        <input type="text" id="cert_tc_refno" class="form-control" readonly placeholder="Auto-generated on Generate" />
                    </div>
                    <div class="flex gap-1">
                        <button class="btn-portal btn-primary" onclick="generateCertificate('tc')">
                            <i class="fas fa-magic"></i> Generate TC
                        </button>
                        <button class="btn-portal btn-secondary" onclick="clearCertFields('tc')">
                            <i class="fas fa-eraser"></i> Reset
                        </button>
                    </div>
                </div>
            </section>
