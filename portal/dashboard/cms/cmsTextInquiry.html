<section id="cmsTextInquirySection" class="dashboard-section hidden">
                    <div class="card">
                        <h3><i class="fas fa-question-circle"></i> Inquiry Page Text Customization</h3>
                        <form id="cmsTextInquiryForm">
                            <div class="form-group">
                                <label>Header Title</label
                                ><input
                                    type="text"
                                    id="textInquiryHeaderTitle"
                                    class="form-control"
                                    title="Header Title"
                                />
                            </div>
                            <div class="form-group">
                                <label>Header Subtitle</label
                                ><textarea
                                    id="textInquiryHeaderSubtitle"
                                    rows="2"
                                    class="form-control"
                                    title="Header Subtitle"
                                ></textarea>
                            </div>
                            <button type="submit" class="btn-portal btn-primary mt-1-5" title="Save Inquiry Text">
                                <i class="fas fa-save"></i> Save Inquiry Page Text
                            </button>
                        </form>
                    </div>
                </section>
