<section id="manageExamScheduleSection" class="dashboard-section card hidden">
                    <div class="header mb-2">
                        <div>
                            <h1>Manage Exam Schedule</h1>
                            <p>Search, Add and Edit exam timetables with per-paper details</p>
                        </div>
                        <div class="flex gap-0-75">
                            <button
                                onclick="scheduleDownloadPdf()"
                                class="btn-portal btn-ghost"
                                title="Download as PDF"
                            >
                                <i class="fas fa-file-pdf mr-1"></i> Download PDF
                            </button>
                            <button onclick="saveExamSchedule()" class="btn-portal btn-primary" title="Save Schedule">
                                <i class="fas fa-cloud-upload-alt mr-1"></i> Save Schedule
                            </button>
                        </div>
                    </div>

                    <!-- Filter Bar -->
                    <div class="glass-card p-1-5 mb-2">
                        <h4 class="mb-1 text-muted"><i class="fas fa-filter mr-0-5"></i> Exam Selection</h4>
                        <div class="grid-4 gap-1">
                            <div class="form-group mb-0">
                                <label>Session <span class="text-danger">*</span></label>
                                <select
                                    id="scheduleSessionSelect"
                                    class="form-control"
                                    title="Session"
                                    onchange="scheduleLoadClasses()"
                                >
                                    <option value="">Select Session</option>
                                </select>
                            </div>
                            <div class="form-group mb-0">
                                <label>Class <span class="text-danger">*</span></label>
                                <select
                                    id="scheduleClassSelect"
                                    class="form-control"
                                    title="Select Class"
                                    onchange="scheduleLoadExams()"
                                >
                                    <option value="">Select Session First</option>
                                </select>
                            </div>
                            <div class="form-group mb-0">
                                <label>Year/Semester</label>
                                <select id="scheduleYearSemSelect" class="form-control" title="Year/Semester">
                                    <option value="1">1st</option>
                                    <option value="2">2nd</option>
                                    <option value="3">3rd</option>
                                    <option value="4">4th</option>
                                </select>
                            </div>
                            <div class="form-group mb-0">
                                <label>Exam <span class="text-danger">*</span></label>
                                <select
                                    id="scheduleExamSelect"
                                    class="form-control"
                                    title="Assessment Term"
                                    onchange="loadScheduleGrid()"
                                >
                                    <option value="">Select Exam</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- Per-Paper Cards Container -->
                    <div class="glass-card p-2">
                        <div class="flex flex-between align-center mb-1-5">
                            <h3 class="m-0"><i class="fas fa-file-invoice text-primary mr-0-5"></i> Exam Papers</h3>
                            <button
                                id="scheduleAddPaperBtn"
                                onclick="scheduleAddPaper()"
                                class="btn-portal btn-ghost hidden"
                                title="Add Paper"
                            >
                                <i class="fas fa-plus mr-1"></i> Add Paper Row
                            </button>
                        </div>
                        <div id="schedulePapersContainer" class="space-y-3">
                            <div class="text-center p-3 text-muted">
                                <i class="fas fa-calendar-times text-4xl opacity-20 block mb-1"></i>
                                <p>Select Session, Class and Exam to view or add papers</p>
                            </div>
                        </div>
                    </div>
                </section>
