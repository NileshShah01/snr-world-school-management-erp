<section id="cmsTextHomeSection" class="dashboard-section hidden">
                    <div class="card">
                        <h3><i class="fas fa-home"></i> Home Page Text Customization</h3>
                        <p class="text-xs text-muted mb-1-5">Update headings and descriptions on the Home page.</p>
                        <form id="cmsTextHomeForm">
                            <div class="form-group">
                                <label>Hero Title</label>
                                <input
                                    type="text"
                                    id="textHomeHeroTitle"
                                    placeholder="Welcome to our School"
                                    class="form-control"
                                    title="Hero Title"
                                />
                            </div>
                            <div class="form-group">
                                <label>Hero Subtitle</label>
                                <textarea
                                    id="textHomeHeroSubtitle"
                                    rows="2"
                                    placeholder="Quality Education • Discipline • Character Building"
                                    class="form-control"
                                    title="Hero Subtitle"
                                ></textarea>
                            </div>
                            <div class="form-group">
                                <label>Intro Section Title</label>
                                <input
                                    type="text"
                                    id="textHomeIntroTitle"
                                    placeholder="Brief description about the school"
                                    class="form-control"
                                    title="Intro Section Title"
                                />
                            </div>
                            <div class="form-group">
                                <label>Intro Section Main Text</label>
                                <textarea
                                    id="textHomeIntroText"
                                    rows="3"
                                    class="form-control"
                                    title="Intro Section Main Text"
                                ></textarea>
                            </div>
                            <div class="form-group">
                                <label>Intro Section Subtext</label>
                                <textarea
                                    id="textHomeIntroSubtext"
                                    rows="2"
                                    class="form-control"
                                    title="Intro Section Subtext"
                                ></textarea>
                            </div>
                            <button type="submit" class="btn-portal btn-primary mt-1-5" title="Save Home Page Text">
                                <i class="fas fa-save"></i> Save Home Page Text
                            </button>
                        </form>
                    </div>
                </section>
