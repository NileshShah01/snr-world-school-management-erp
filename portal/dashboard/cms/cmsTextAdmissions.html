<section id="cmsTextAdmissionsSection" class="dashboard-section hidden">
                    <div class="card">
                        <h3><i class="fas fa-user-plus"></i> Admissions Page Text Customization</h3>
                        <form id="cmsTextAdmissionsForm">
                            <div class="form-group">
                                <label>Header Title</label
                                ><input
                                    type="text"
                                    id="textAdmissionsHeaderTitle"
                                    class="form-control"
                                    title="Header Title"
                                />
                            </div>
                            <div class="form-group">
                                <label>Header Subtitle</label
                                ><input
                                    type="text"
                                    id="textAdmissionsHeaderSubtitle"
                                    class="form-control"
                                    title="Header Subtitle"
                                />
                            </div>
                            <div class="form-group">
                                <label>Visit School Text</label
                                ><textarea
                                    id="textAdmissionsVisitText"
                                    rows="2"
                                    class="form-control"
                                    title="Visit School Text"
                                ></textarea>
                            </div>
                            <div class="form-group">
                                <label>Required Documents</label>
                                <div class="grid-cols-2 gap-0-5">
                                    <input
                                        type="text"
                                        id="textAdmissionsDoc1"
                                        class="form-control"
                                        placeholder="Doc 1"
                                        title="Required Document 1"
                                    />
                                    <input
                                        type="text"
                                        id="textAdmissionsDoc2"
                                        class="form-control"
                                        placeholder="Doc 2"
                                        title="Required Document 2"
                                    />
                                    <input
                                        type="text"
                                        id="textAdmissionsDoc3"
                                        class="form-control"
                                        placeholder="Doc 3"
                                        title="Required Document 3"
                                    />
                                    <input
                                        type="text"
                                        id="textAdmissionsDoc4"
                                        class="form-control"
                                        placeholder="Doc 4"
                                        title="Required Document 4"
                                    />
                                    <input
                                        type="text"
                                        id="textAdmissionsDoc5"
                                        class="form-control"
                                        placeholder="Doc 5"
                                        title="Required Document 5"
                                    />
                                    <input
                                        type="text"
                                        id="textAdmissionsDoc6"
                                        class="form-control"
                                        placeholder="Doc 6"
                                        title="Required Document 6"
                                    />
                                </div>
                            </div>

                            <div class="card bg-slate-light mb-1">
                                <h4 class="mb-1">Call to Action (Admissions)</h4>
                                <div class="form-group">
                                    <label>CTA Title</label>
                                    <input
                                        type="text"
                                        id="textAdmissionsCtaTitle"
                                        class="form-control"
                                        title="CTA Title"
                                    />
                                </div>
                                <div class="form-group">
                                    <label>CTA Subtitle</label>
                                    <input
                                        type="text"
                                        id="textAdmissionsCtaSubtitle"
                                        class="form-control"
                                        title="CTA Subtitle"
                                    />
                                </div>
                                <div class="form-group">
                                    <label>CTA Button Text</label>
                                    <input
                                        type="text"
                                        id="textAdmissionsCtaBtn"
                                        class="form-control"
                                        title="CTA Button Text"
                                    />
                                </div>
                            </div>

                            <button
                                type="submit"
                                class="btn-portal btn-primary w-full"
                                title="Save Admissions Page Text"
                            >
                                <i class="fas fa-save"></i> Save Admissions Page Text
                            </button>
                        </form>
                    </div>
                </section>
