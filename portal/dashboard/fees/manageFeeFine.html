<section id="manageFeeFineSection" class="dashboard-section card hidden">
                    <div class="header mb-2">
                        <div>
                            <h1><i class="fas fa-money-bill-wave text-primary"></i> Fee Fine Settings</h1>
                            <p>Configure automatic late payment fines</p>
                        </div>
                    </div>
                    <form id="feeFineForm" onsubmit="saveFeeFineSettings(event)">
                        <div class="grid-3 gap-1-5 mb-1-5">
                            <div class="form-group">
                                <label>Fine Amount (₹)</label>
                                <input
                                    type="number"
                                    id="feeFineAmount"
                                    class="form-control"
                                    placeholder="0"
                                    title="Fine Amount"
                                />
                            </div>
                            <div class="form-group">
                                <label>Fine Type</label>
                                <select id="feeFineType" class="form-control" title="Fine Type">
                                    <option value="fixed">Fixed Amount</option>
                                    <option value="daily">Daily Increment</option>
                                    <option value="percentage">Percentage (%)</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Grace Period (Days)</label>
                                <input
                                    type="number"
                                    id="feeFineGracePeriod"
                                    class="form-control"
                                    placeholder="10"
                                    title="Grace Period"
                                />
                            </div>
                        </div>
                        <button type="submit" class="btn-portal btn-primary">
                            <i class="fas fa-save"></i> Save Fine Rules
                        </button>
                    </form>
                </section>
