<section id="examGradingSection" class="dashboard-section card hidden">
                    <div class="header mb-2 text-center">
                        <h1>Exam Grading Rules</h1>
                        <p>Define percentage ranges for automatic grade calculation</p>
                    </div>
                    <div class="grid-2 gap-2">
                        <div class="glass-card p-2">
                            <h3><i class="fas fa-plus-circle text-primary mr-0-5"></i> Add Grading Rule</h3>
                            <form id="addGradingForm" onsubmit="handleGradingSubmit(event)" class="mt-1-5">
                                <div class="form-group">
                                    <label>Grade Name (e.g., A1)</label>
                                    <input
                                        type="text"
                                        id="gradeNameInput"
                                        class="form-control"
                                        placeholder="A1"
                                        required
                                        title="Grade Name"
                                    />
                                </div>
                                <div class="grid-2 gap-1">
                                    <div class="form-group">
                                        <label>Min %</label>
                                        <input
                                            type="number"
                                            id="gradeMinInput"
                                            class="form-control"
                                            placeholder="91"
                                            required
                                            title="Minimum Percentage"
                                        />
                                    </div>
                                    <div class="form-group">
                                        <label>Max %</label>
                                        <input
                                            type="number"
                                            id="gradeMaxInput"
                                            class="form-control"
                                            placeholder="100"
                                            required
                                            title="Maximum Percentage"
                                        />
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label>Remarks</label>
                                    <input
                                        type="text"
                                        id="gradeRemarksInput"
                                        class="form-control"
                                        placeholder="Outstanding"
                                        title="Remarks"
                                    />
                                </div>
                                <button type="submit" class="btn-portal btn-primary w-full mt-1">
                                    <i class="fas fa-save mr-1"></i> Save Grading Rule
                                </button>
                            </form>
                        </div>
                        <div class="glass-card p-2">
                            <div class="flex flex-between align-center mb-1-5">
                                <h3><i class="fas fa-table text-primary mr-0-5"></i> Grading Schema</h3>
                                <span class="badge bg-primary-light text-primary">Active</span>
                            </div>
                            <div class="table-container">
                                <table class="portal-table">
                                    <thead>
                                        <tr>
                                            <th>Grade</th>
                                            <th>Range (%)</th>
                                            <th>Remarks</th>
                                            <th class="text-right">Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody id="gradingTableBody">
                                        <!-- Populated via JS -->
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </section>
