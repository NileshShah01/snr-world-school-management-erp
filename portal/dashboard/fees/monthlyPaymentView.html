<section id="monthlyPaymentViewSection" class="dashboard-section hidden">
                    <div class="header">
                        <div>
                            <h1><i class="fas fa-calendar-check text-primary"></i> Monthly Payment View</h1>
                            <p>View which students have paid for a specific month</p>
                        </div>
                    </div>
                    <div class="card max-w-600 mx-auto p-1-5 mb-1-5">
                        <div class="grid-3 gap-1">
                            <div class="form-group">
                                <label>Session</label>
                                <select id="mpvSession" class="form-control" onchange="loadMonthlyPaymentView()">
                                    <option value="">-- Session --</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Month</label>
                                <select id="mpvMonth" class="form-control" onchange="loadMonthlyPaymentView()">
                                    <option value="">-- Month --</option>
                                    <option value="January">January</option>
                                    <option value="February">February</option>
                                    <option value="March">March</option>
                                    <option value="April">April</option>
                                    <option value="May">May</option>
                                    <option value="June">June</option>
                                    <option value="July">July</option>
                                    <option value="August">August</option>
                                    <option value="September">September</option>
                                    <option value="October">October</option>
                                    <option value="November">November</option>
                                    <option value="December">December</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Class</label>
                                <select id="mpvClass" class="form-control" onchange="loadMonthlyPaymentView()">
                                    <option value="">All Classes</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <div class="grid-3 gap-1-5 mb-1-5" id="mpvSummary">
                        <div class="card p-1-5 text-center">
                            <div class="text-muted text-sm mb-0-5">Total Students</div>
                            <div class="text-xl font-bold" id="mpvTotal">0</div>
                        </div>
                        <div class="card p-1-5 text-center">
                            <div class="text-muted text-sm mb-0-5">Paid</div>
                            <div class="text-xl font-bold text-green" id="mpvPaid">0</div>
                        </div>
                        <div class="card p-1-5 text-center">
                            <div class="text-muted text-sm mb-0-5">Unpaid</div>
                            <div class="text-xl font-bold text-red" id="mpvUnpaid">0</div>
                        </div>
                    </div>
                    <div class="table-container">
                        <table class="portal-table">
                            <thead>
                                <tr>
                                    <th>Student ID</th>
                                    <th>Name</th>
                                    <th>Class</th>
                                    <th>Status</th>
                                    <th class="text-right">Amount Due</th>
                                    <th class="text-right">Amount Paid</th>
                                </tr>
                            </thead>
                            <tbody id="monthlyPaymentViewBody">
                                <tr><td colspan="6" class="text-center text-muted p-2">Select session and month to view</td></tr>
                            </tbody>
                        </table>
                    </div>
                </section>
