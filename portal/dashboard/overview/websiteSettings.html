<section id="websiteSettingsSection" class="dashboard-section card hidden">
                    <h3>Frontend Website Settings</h3>
                    <p class="text-sm text-muted mb-2">
                        Update the public-facing text, marquees, and contact info directly from here.
                    </p>

                    <form id="websiteSettingsForm">
                        <div class="form-group">
                            <label>Top Scrolling Marquee Announcement</label>
                            <textarea
                                id="set_marquee"
                                rows="3"
                                placeholder="Admission Open for Academic Session 2026-2027..."
                                class="form-control"
                                title="Marquee Announcement"
                            ></textarea>
                        </div>

                        <div class="grid-cols-2 mb-1-5">
                            <div class="form-group">
                                <label>Contact Phone Number</label>
                                <input
                                    type="text"
                                    id="set_phone"
                                    placeholder="e.g. +91 8084243031"
                                    class="form-control"
                                    title="Contact Phone"
                                />
                            </div>
                            <div class="form-group">
                                <label>Contact Email Address</label>
                                <input
                                    type="email"
                                    id="set_email"
                                    placeholder="e.g. admin@apex.com"
                                    class="form-control"
                                    title="Contact Email"
                                />
                            </div>
                        </div>

                        <div class="grid-cols-2 mb-1-5">
                            <div class="form-group">
                                <label>DPO Email (Data Protection Officer)</label>
                                <input
                                    type="email"
                                    id="set_dpoEmail"
                                    placeholder="dpo@school.com"
                                    class="form-control"
                                    title="DPO Email"
                                />
                            </div>
                            <div class="form-group">
                                <label>DPO Phone</label>
                                <input
                                    type="text"
                                    id="set_dpoPhone"
                                    placeholder="+91 9876543210"
                                    class="form-control"
                                    title="DPO Phone"
                                />
                            </div>
                        </div>

                        <div class="form-group mb-2">
                            <label>School Address Display</label>
                            <textarea
                                id="set_address"
                                rows="2"
                                placeholder="Anjani Bazar, ..."
                                class="form-control"
                                title="School Address"
                            ></textarea>
                        </div>

                        <button type="submit" class="btn-portal btn-primary" title="Save Global Settings">
                            <i class="fas fa-save"></i> Save Global Settings
                        </button>
                    </form>
                </section>
