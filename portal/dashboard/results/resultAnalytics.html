<section id="resultAnalyticsSection" class="dashboard-section card hidden">
                    <div class="header mb-2 text-center">
                        <h1>Result & Performance Analytics</h1>
                        <p>Visualizing academic performance across classes and sessions</p>
                    </div>
                    <div class="glass-card p-1-5 mb-2 grid-4 gap-1 align-flex-end">
                        <div class="form-group mb-0">
                            <label>Session</label>
                            <select
                                id="analytic_sessionSelect"
                                class="form-control"
                                onchange="
                                    ResultAnalytics.loadClasses();
                                    ResultAnalytics.loadExams();
                                "
                                title="Select Session"
                            ></select>
                        </div>
                        <div class="form-group mb-0">
                            <label>Class</label>
                            <select id="analytic_classSelect" class="form-control" title="Select Class"></select>
                        </div>
                        <div class="form-group mb-0">
                            <label>Exam</label>
                            <select id="analytic_examSelect" class="form-control" title="Select Exam"></select>
                        </div>
                        <button
                            class="btn-portal btn-primary h-42"
                            onclick="ResultAnalytics.refresh()"
                            title="Generate Analytics"
                        >
                            <i class="fas fa-sync mr-1"></i> Generate
                        </button>
                    </div>

                    <div class="grid-3 gap-1-5 mb-2">
                        <div class="glass-card p-1-5 border-left-primary">
                            <p class="text-xs text-muted uppercase font-bold mb-0-5">Average Score</p>
                            <h2 id="an_avgScore" class="text-xl secondary">0</h2>
                        </div>
                        <div class="glass-card p-1-5 border-left-success">
                            <p class="text-xs text-muted uppercase font-bold mb-0-5">Highest Score</p>
                            <h2 id="an_highestScore" class="text-xl secondary">0</h2>
                        </div>
                        <div class="glass-card p-1-5 border-left-amber">
                            <p class="text-xs text-muted uppercase font-bold mb-0-5">Pass %</p>
                            <h2 id="an_passPercent" class="text-xl secondary">0%</h2>
                        </div>
                    </div>

                    <div class="grid-2 gap-1-5">
                        <div class="glass-card p-2">
                            <h3 class="mb-1-5">
                                <i class="fas fa-chart-bar text-primary mr-0-5"></i> Subject Performance
                            </h3>
                            <div class="chart-container-300">
                                <canvas id="subjectChart"></canvas>
                            </div>
                        </div>
                        <div class="glass-card p-2">
                            <h3 class="mb-1-5">
                                <i class="fas fa-chart-pie text-secondary mr-0-5"></i> Score Distribution
                            </h3>
                            <div class="chart-container-300">
                                <canvas id="distChart"></canvas>
                            </div>
                        </div>
                    </div>
                </section>
