<section id="addSyllabusSection" class="dashboard-section hidden">
                    <div class="header">
                        <div>
                            <h1><i class="fas fa-book-medical text-primary"></i> Syllabus & Resources</h1>
                            <p>Upload PDFs, books, and study materials for students</p>
                        </div>
                    </div>

                    <div class="card mb-1-5">
                        <h3><i class="fas fa-upload primary text-lg mr-0-5"></i> Upload New Syllabus / Book</h3>
                        <form id="addSyllabusForm" onsubmit="saveSyllabus(event)">
                            <div class="grid-3 gap-1 mb-1-5">
                                <div class="form-group">
                                    <label>Select Class</label>
                                    <select id="syllabusClass" class="form-control" required title="Select Class">
                                        <option value="">Choose Class</option>
                                        <option value="Play Group">Play Group</option>
                                        <option value="Nursery">Nursery</option>
                                        <option value="LKG">LKG</option>
                                        <option value="UKG">UKG</option>
                                        <option value="Class 1">Class 1</option>
                                        <option value="Class 2">Class 2</option>
                                        <option value="Class 3">Class 3</option>
                                        <option value="Class 4">Class 4</option>
                                        <option value="Class 5">Class 5</option>
                                        <option value="Class 6">Class 6</option>
                                        <option value="Class 7">Class 7</option>
                                        <option value="Class 8">Class 8</option>
                                        <option value="Class 9">Class 9</option>
                                        <option value="Class 10">Class 10</option>
                                        <option value="Class 11">Class 11</option>
                                        <option value="Class 12">Class 12</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label>Subject</label>
                                    <input
                                        type="text"
                                        id="syllabusSubject"
                                        class="form-control"
                                        placeholder="e.g. Mathematics"
                                        required
                                        title="Subject"
                                    />
                                </div>
                                <div class="form-group">
                                    <label>Resource Type</label>
                                    <select id="syllabusType" class="form-control" title="Resource Type">
                                        <option value="syllabus">Syllabus</option>
                                        <option value="book">Book</option>
                                        <option value="notes">Notes</option>
                                        <option value="worksheet">Worksheet</option>
                                        <option value="guide">Guide</option>
                                    </select>
                                </div>
                            </div>
                            <div class="form-group mb-1-5">
                                <label>Upload File (PDF) or Enter URL</label>
                                <div class="flex gap-1">
                                    <input
                                        type="file"
                                        id="syllabusFile"
                                        class="form-control"
                                        accept=".pdf,.doc,.docx,.ppt,.pptx"
                                        title="Upload PDF or Document"
                                        style="flex: 1"
                                    />
                                    <span class="text-muted text-sm self-center">OR</span>
                                    <input
                                        type="url"
                                        id="syllabusLink"
                                        class="form-control"
                                        placeholder="https://drive.google.com/..."
                                        title="Syllabus Link"
                                        style="flex: 1"
                                    />
                                </div>
                            </div>
                            <button type="submit" class="btn-portal btn-primary">
                                <i class="fas fa-cloud-upload-alt"></i> Upload Syllabus
                            </button>
                        </form>
                    </div>

                    <div class="card">
                        <div class="flex-between mb-1">
                            <h3><i class="fas fa-folder-open primary text-lg mr-0-5"></i> Existing Resources</h3>
                            <div class="flex gap-1">
                                <select
                                    id="syllabusFilterClass"
                                    class="form-control"
                                    onchange="loadSyllabusList()"
                                    style="width: 150px"
                                >
                                    <option value="">All Classes</option>
                                    <option value="Play Group">Play Group</option>
                                    <option value="Nursery">Nursery</option>
                                    <option value="LKG">LKG</option>
                                    <option value="UKG">UKG</option>
                                    <option value="Class 1">Class 1</option>
                                    <option value="Class 2">Class 2</option>
                                    <option value="Class 3">Class 3</option>
                                    <option value="Class 4">Class 4</option>
                                    <option value="Class 5">Class 5</option>
                                    <option value="Class 6">Class 6</option>
                                    <option value="Class 7">Class 7</option>
                                    <option value="Class 8">Class 8</option>
                                    <option value="Class 9">Class 9</option>
                                    <option value="Class 10">Class 10</option>
                                    <option value="Class 11">Class 11</option>
                                    <option value="Class 12">Class 12</option>
                                </select>
                            </div>
                        </div>
                        <div id="syllabusListContainer" class="grid-3 gap-1">
                            <p class="text-center p-2 text-muted col-span-full">Loading syllabus data...</p>
                        </div>
                    </div>
                </section>
