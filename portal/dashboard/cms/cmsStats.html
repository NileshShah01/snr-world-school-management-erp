<section id="cmsStatsSection" class="dashboard-section card hidden">
                    <h3><i class="fas fa-chart-bar"></i> Stats & Numbers</h3>
                    <p class="text-muted text-sm mb-1-5">
                        Update the numbers shown on the Homepage and Facilities page.
                    </p>
                    <form id="cmsStatsForm" class="grid-3 gap-1-5">
                        <div class="form-group">
                            <label>Total Students</label
                            ><input type="number" id="stat_students" placeholder="e.g. 300" title="Total Students" />
                        </div>
                        <div class="form-group">
                            <label>Total Teachers</label
                            ><input type="number" id="stat_teachers" placeholder="e.g. 15" title="Total Teachers" />
                        </div>
                        <div class="form-group">
                            <label>Total Classrooms</label
                            ><input type="number" id="stat_classrooms" placeholder="e.g. 12" title="Total Classrooms" />
                        </div>
                        <div class="form-group">
                            <label>Years of Excellence</label
                            ><input type="number" id="stat_years" placeholder="e.g. 10" title="Years of Excellence" />
                        </div>
                        <div class="col-span-full">
                            <button type="submit" class="btn-portal btn-primary" title="Save Stats">
                                <i class="fas fa-save"></i> Save Stats
                            </button>
                        </div>
                    </form>
                </section>
