<section id="inquiriesSection" class="dashboard-section card hidden">
                    <div class="flex flex-between align-center mb-1-5">
                        <div>
                            <h3 class="mb-0-25"><i class="fas fa-inbox"></i> Admission Inquiries</h3>
                            <p class="text-sm text-muted">Public inquiries submitted from the website inquiry form.</p>
                        </div>
                        <div class="flex gap-1">
                            <button
                                class="btn-portal bg-emerald text-white"
                                onclick="exportToCSV('inquiries')"
                                title="Export CSV"
                            >
                                <i class="fas fa-file-csv"></i> Export CSV
                            </button>
                            <button class="btn-portal btn-ghost" onclick="loadInquiries()" title="Refresh">
                                <i class="fas fa-sync"></i> Refresh
                            </button>
                        </div>
                    </div>
                    <div class="table-container">
                        <table class="portal-table">
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Student Name</th>
                                    <th>Parent Name</th>
                                    <th>Mobile</th>
                                    <th>Class</th>
                                    <th>Village</th>
                                    <th>Status</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="inquiryTableBody">
                                <tr>
                                    <td colspan="8" class="text-center">Loading...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </section>
