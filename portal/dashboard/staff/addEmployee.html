<section id="addEmployeeSection" class="dashboard-section" style="display: none">
                <div class="section-header">
                    <h1>Add Teacher / Employee</h1>
                    <p>Fill required fields (Name, Mobile, Email, Password) — everything else is optional</p>
                </div>
                <div class="card p-20">
                    <form id="addEmployeeForm" onsubmit="handleAddEmployee(event)">
                        <div class="row g-3">
                            <!-- Photo Upload -->
                            <div class="col-md-3 text-center">
                                <div style="width:140px;height:140px;border-radius:50%;border:3px dashed var(--border,#334155);margin:0 auto 0.75rem;display:flex;align-items:center;justify-content:center;overflow:hidden;background:var(--bg-card,#1e293b);position:relative;cursor:pointer;" onclick="document.getElementById('emp_photo').click()">
                                    <img id="empPhotoPreview" style="display:none;width:100%;height:100%;object-fit:cover;" />
                                    <i id="empPhotoPlaceholder" class="fas fa-camera text-muted" style="font-size:2rem;"></i>
                                    <input type="file" id="emp_photo" accept="image/*" style="display:none;" onchange="previewEmpPhoto(this)" />
                                </div>
                                <p class="text-xs text-muted">Click to upload photo</p>
                            </div>

                            <!-- REQUIRED FIELDS -->
                            <div class="col-md-9">
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label class="form-label"><span class="text-danger">*</span> Full Name</label>
                                        <input type="text" class="form-control" id="emp_name" placeholder="Full name" required />
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">Employee ID</label>
                                        <input type="text" class="form-control" id="emp_id" placeholder="Auto-generated if empty" />
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label"><span class="text-danger">*</span> Mobile Number</label>
                                        <input type="tel" class="form-control" id="emp_phone" placeholder="10-digit mobile" required />
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label"><span class="text-danger">*</span> Email (Login ID)</label>
                                        <input type="email" class="form-control" id="emp_email" placeholder="Email address (also login username)" required />
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label"><span class="text-danger">*</span> Login Password</label>
                                        <input type="password" class="form-control" id="emp_password" placeholder="Min 6 characters" required />
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label"><span class="text-danger">*</span> Confirm Password</label>
                                        <input type="password" class="form-control" id="emp_password_confirm" placeholder="Re-enter password" required />
                                    </div>
                                </div>
                            </div>

                            <!-- OPTIONAL FIELDS -->
                            <div class="col-12 mt-2">
                                <hr style="border-color:var(--border,#334155);opacity:0.3;" />
                                <p class="text-sm text-muted mt-0-5 mb-1"><i class="fas fa-chevron-down fa-xs"></i> Optional Details</p>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label">Designation</label>
                                <select class="form-control" id="emp_designation">
                                    <option value="">Select</option>
                                    <option value="Principal">Principal</option>
                                    <option value="VicePrincipal">Vice Principal</option>
                                    <option value="PGT">PGT</option>
                                    <option value="TGT">TGT</option>
                                    <option value="PRT">PRT</option>
                                    <option value="NTT">NTT</option>
                                    <option value="AdminStaff">Admin Staff</option>
                                    <option value="Accountant">Accountant</option>
                                    <option value="Librarian">Librarian</option>
                                    <option value="Driver">Driver</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">RBAC Permission Set</label>
                                <select class="form-control" id="emp_rbac_designation">
                                    <option value="">None (Admin-only)</option>
                                </select>
                                <small class="text-muted">Links to Designations &amp; Permissions — controls what sections the teacher sees.</small>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Department</label>
                                <select class="form-control" id="emp_department">
                                    <option value="Teaching">Teaching</option>
                                    <option value="Administration">Administration</option>
                                    <option value="Accounts">Accounts</option>
                                    <option value="Library">Library</option>
                                    <option value="Transport">Transport</option>
                                    <option value="Maintenance">Maintenance</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Employment Type</label>
                                <select class="form-control" id="emp_type">
                                    <option value="Permanent">Permanent</option>
                                    <option value="Contract">Contract</option>
                                    <option value="Temporary">Temporary</option>
                                    <option value="Visiting">Visiting</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Date of Joining</label>
                                <input type="date" class="form-control" id="emp_doj" />
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Qualification</label>
                                <input type="text" class="form-control" id="emp_qualification" placeholder="e.g. M.Sc, B.Ed" />
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Basic Salary (₹)</label>
                                <input type="number" class="form-control" id="emp_salary" placeholder="0" min="0" />
                            </div>
                            <div class="col-12">
                                <label class="form-label">Address</label>
                                <textarea class="form-control" id="emp_address" rows="2" placeholder="Residential address"></textarea>
                            </div>

                            <div class="col-12 mt-1">
                                <button type="submit" class="btn btn-primary btn-lg"><i class="fas fa-save"></i> Save &amp; Create Login</button>
                            </div>
                        </div>
                    </form>
                </div>
            </section>
