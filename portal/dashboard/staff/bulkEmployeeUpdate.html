<section id="bulkEmployeeUpdateSection" class="dashboard-section" style="display: none">
                <div class="section-header">
                    <h1>Bulk Employee Update</h1>
                </div>
                <div class="card p-20">
                    <div class="alert alert-info">
                        <i class="fas fa-info-circle"></i> Upload a CSV file to bulk update employee information. File must have columns: employee_id, name, phone, email, designation, department, status.
                    </div>
                    <form id="bulkEmpForm" onsubmit="handleBulkEmployeeUpload(event)">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Upload CSV File</label>
                                <input type="file" class="form-control" id="bulkEmpFile" accept=".csv" required />
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Action</label>
                                <select class="form-control" id="bulkEmpAction">
                                    <option value="update">Update Existing</option>
                                    <option value="create">Create New</option>
                                </select>
                            </div>
                            <div class="col-md-3 d-flex align-items-end">
                                <button type="submit" class="btn btn-primary w-100"><i class="fas fa-upload"></i> Upload</button>
                            </div>
                        </div>
                    </form>
                    <div id="bulkEmpResult" class="mt-3" style="display:none;"></div>
                </div>
            </section>
